version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    POSTGRES_HOST: postgres
    POSTGRES_USER: dbt
    POSTGRES_PASSWORD: dbt
    POSTGRES_DB: data_platform
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dbt
      POSTGRES_PASSWORD: dbt
      POSTGRES_DB: data_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  # Airflow init: creates the airflow metadata DB and the dbt user/schema.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    restart: "no"

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  dbt:
    image: python:3.11-slim
    working_dir: /opt/dbt
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: dbt
      POSTGRES_PASSWORD: dbt
      POSTGRES_DB: data_platform
    volumes:
      - ./dbt_project:/opt/dbt/dbt_project
    command: >
      bash -c "pip install dbt-postgres==1.7.4 &&
               cd dbt_project &&
               dbt deps --no-version-check &&
               dbt seed --profiles-dir . &&
               dbt run --profiles-dir . &&
               dbt test --profiles-dir ."

volumes:
  pgdata:
