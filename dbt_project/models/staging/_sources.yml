-- Sources consumed by staging models. In production these would point at
-- S3, GCS, Snowflake, Redshift, etc. Here we point at Postgres raw schema.
version: 2

sources:
  - name: raw
    description: "Raw landing zone (Postgres schema 'raw')"
    database: "{{ env_var('POSTGRES_DB', 'data_platform') }}"
    schema: raw
    tables:
      - name: orders
        description: "Raw order events"
        columns:
          - name: order_id
            tests:
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: amount
          - name: currency
          - name: status
          - name: created_at
      - name: customers
        description: "Raw customer records"
        columns:
          - name: customer_id
            tests:
              - not_null
          - name: name
          - name: email
          - name: tier
          - name: created_at
